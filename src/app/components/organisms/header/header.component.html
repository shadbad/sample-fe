<!-- Top-of-page banner; role="banner" is implicit on a top-level <header> but
     stated explicitly to satisfy landmark expectations in deep component trees. -->
<header class="header" role="banner">
  <!-- %wrapper inner container: max-width constraint + horizontal padding -->
  <div class="header__inner">
    <app-logo-link />
    <app-nav />
  </div>
</header>
